<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Catálogo Multi-Categoría - TUVOLTIO</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    :root {
      --primary: #f7d000;
      --shopify: #008060;
      --bg: #f4f4f4;
      --danger: #e74c3c;
      --success: #2ecc71;
      --dark: #222;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      padding: 0;
      margin: 0;
      padding-top: 180px; /* Espacio para cabecera fija */
    }

    /* CABECERA FIJA */
    .nav-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    .header-logo {
      text-align: center;
      padding: 15px 10px 5px 10px;
    }

    .logo-img {
      max-width: 200px;
      height: auto;
    }

    /* MENU RESPONSIVE MEJORADO */
    .menu-categorias {
      display: flex;
      gap: 10px;
      padding: 10px 15px;
      overflow-x: auto; /* Scroll horizontal */
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none; /* Oculta scroll en Firefox */
    }

    /* Centrar menú en pantallas grandes */
    @media (min-width: 768px) {
      .menu-categorias {
        justify-content: center;
      }
    }

    .menu-categorias::-webkit-scrollbar { display: none; } /* Oculta scroll en Chrome/Safari */

    .category-btn {
      padding: 8px 18px;
      border: 2px solid transparent;
      border-radius: 20px;
      background: #eee;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      font-size: 0.85rem;
      flex-shrink: 0; /* Evita que los botones se achiquen */
    }

    .category-btn.active {
      background: var(--primary);
      border-color: var(--dark);
    }

    .search-container {
      text-align: center;
      padding: 5px 10px 15px 10px;
    }

    #buscador {
      width: 90%;
      max-width: 400px;
      padding: 10px 20px;
      border-radius: 25px;
      border: 1px solid #ddd;
      outline: none;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      max-width: 1300px;
      margin: 0 auto;
      padding: 20px;
    }

    /* CARD */
    .card {
      background: white;
      padding: 15px;
      border-radius: 16px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.08);
      text-align: center;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .badge {
      position: absolute;
      top: 15px;
      right: 15px;
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      color: white;
      z-index: 5;
    }
    .badge-nuevo { background: var(--success); }
    .badge-agotado { background: var(--danger); }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 12px;
      background: #f9f9f9;
    }

    .agotado-img { filter: grayscale(0.8) opacity(0.6); }

    .price { font-size: 1.4rem; font-weight: 800; margin: 12px 0; }
    
    .buttons-gap {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: auto;
    }

    .btn {
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 0.85rem;
    }

    .btn-wa { background: var(--primary); color: #000; }
    .btn-shopify { 
      background: #fff; 
      color: var(--shopify); 
      border: 1.5px solid var(--shopify); 
    }
  </style>
</head>
<body>

<div class="nav-container">
  <div class="header-logo">
    <img src="Recurso 3.png" alt="TUVOLTIO" class="logo-img">
  </div>
  
  <div class="menu-categorias">
    <button class="category-btn active" onclick="filtrarCategoria('todos')">Todos</button>
    <button class="category-btn" onclick="filtrarCategoria('iluminacion')">Iluminación</button>
    <button class="category-btn" onclick="filtrarCategoria('termoencogible')">Termoencogible</button>
    <button class="category-btn" onclick="filtrarCategoria('equipos-herramientas')">Equipos</button>
    <button class="category-btn" onclick="filtrarCategoria('electronica')">Electrónica</button>
  </div>

  <div class="search-container">
    <input type="text" id="buscador" placeholder="¿Qué buscas hoy?">
  </div>
</div>

<div class="grid" id="catalogo"></div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS9QD0qdhIfzYUJymEjvB4Q9OO3BFDYqWZpiZMVssAE4nQQYJJZ7Y6Isc_brmSUqqH9CFYlxwxHlGzq/pub?gid=0&single=true&output=csv";
let productosTotales = [];
let categoriaActual = 'todos';

function getVal(p, key) {
  const foundKey = Object.keys(p).find(k => k.toLowerCase().trim() === key.toLowerCase());
  return p[foundKey] ? String(p[foundKey]).trim() : "";
}

function mostrarProductos(productos) {
  const container = document.getElementById("catalogo");
  container.innerHTML = "";

  productos.forEach(p => {
    const nombre = getVal(p, 'nombre');
    const precio = getVal(p, 'precio');
    const imagen = getVal(p, 'imagen');
    const inventario = getVal(p, 'inventario');
    const codigo = getVal(p, 'codigo');
    const shopify = getVal(p, 'link_shopify');
    const estado = getVal(p, 'estado').toLowerCase();

    if (nombre !== "" && (parseInt(inventario) > 0 || estado === 'agotado')) {
      
      let msjExtra = estado === 'agotado' ? " (Sé que está AGOTADO, pero consulto disponibilidad)" : "";
      const waLink = `https://wa.me/573218018059?text=Hola! Me interesa: ${nombre} - REF: ${codigo}${msjExtra}`;

      const card = document.createElement("div");
      card.className = "card";
      
      const badgeHTML = (estado !== '' && estado !== 'nada') 
        ? `<span class="badge badge-${estado}">${estado}</span>` 
        : '';

      card.innerHTML = `
        ${badgeHTML}
        <img src="${imagen}" class="${estado === 'agotado' ? 'agotado-img' : ''}" onerror="this.src='https://placehold.co/400x400?text=Sin+Foto'">
        <div style="font-size:0.8rem; color:grey; margin-top:10px;">REF: ${codigo}</div>
        <h3 style="margin:5px 0; font-size:1.1rem;">${nombre}</h3>
        <div class="price">$${Number(precio).toLocaleString('es-CO')}</div>
        
        <div class="buttons-gap">
          <a class="btn btn-wa" target="_blank" href="${waLink}">
            ${estado === 'agotado' ? 'Consultar disponibilidad' : 'Pedir por WhatsApp'}
          </a>
          ${shopify ? `<a href="${shopify}" class="btn btn-shopify" target="_blank">Ver en Web</a>` : ''}
        </div>
      `;
      container.appendChild(card);
    }
  });
}

function filtrarCategoria(cat) {
  categoriaActual = cat;
  document.querySelectorAll('.category-btn').forEach(btn => {
    btn.classList.remove('active');
    if(btn.getAttribute('onclick').includes(`'${cat}'`)) btn.classList.add('active');
  });
  aplicarFiltros();
}

function aplicarFiltros() {
  const termino = document.getElementById('buscador').value.toLowerCase();
  const filtrados = productosTotales.filter(p => {
    const catProd = getVal(p, 'categoria').toLowerCase();
    const nombreProd = getVal(p, 'nombre').toLowerCase();
    const codigoProd = getVal(p, 'codigo').toLowerCase();
    const coincideCategoria = (categoriaActual === 'todos' || catProd === categoriaActual);
    const coincideBusqueda = nombreProd.includes(termino) || codigoProd.includes(termino);
    return coincideCategoria && coincideBusqueda;
  });
  mostrarProductos(filtrados);
}

Papa.parse(sheetURL, {
  download: true,
  header: true,
  complete: (results) => {
    productosTotales = results.data;
    mostrarProductos(productosTotales);
  }
});

document.getElementById('buscador').addEventListener('input', aplicarFiltros);
</script>
</body>
</html>
