<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Catálogo Iluminación - MarketingECG</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    :root {
      --primary: #f7d000;
      --shopify: #008060;
      --bg: #f4f4f4;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      padding: 10px;
      margin: 0;
    }

    h1 {
      text-align: center;
      color: #333;
      font-size: 1.8rem;
      margin: 20px 0;
    }

    /* Buscador Responsive */
    .search-container {
      text-align: center;
      margin-bottom: 25px;
      padding: 0 10px;
    }

    #buscador {
      width: 100%;
      max-width: 500px;
      padding: 14px 25px;
      border-radius: 30px;
      border: 1px solid #ddd;
      font-size: 1rem;
      outline: none;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      box-sizing: border-box; /* Evita que se salga de la pantalla */
    }

    /* Grid Adaptativo (Magia Responsive) */
    .grid {
      display: grid;
      /* En pantallas pequeñas: 1 columna. En medianas: 2. En grandes: 4+ */
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      max-width: 1300px;
      margin: 0 auto;
      padding-bottom: 50px;
    }

    /* Ajuste para celulares muy pequeños */
    @media (max-width: 350px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 16px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.08);
      text-align: center;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
    }

    .card:active { transform: scale(0.98); } /* Efecto al tocar en celular */

    .card img {
      width: 100%;
      height: 250px; /* Más alto para que se luzca el producto */
      object-fit: cover;
      border-radius: 12px;
      background-color: #eee;
    }

    .ref-text {
      font-size: 1rem;
      color: #2d2d2d;
      margin-top: 12px;
      letter-spacing: 0.7px;
    }

    .card h3 {
      font-size: 1.1rem;
      margin: 8px 0;
      color: #222;
      min-height: 2.8em;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.3;
    }

    .price {
      font-size: 1.4rem;
      font-weight: 800;
      color: #000;
      margin-bottom: 5px;
    }

    .stock-text {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 15px;
    }

    .stock-text b { color: #2ecc71; }

    /* Botones */
    .buttons-gap {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: auto; /* Empuja los botones al final */
    }

    .btn {
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 0.9rem;
      display: block;
    }

    .btn-wa {
      background: var(--primary);
      color: #000;
    }
    .btn-shopify {
      background: #fff;
      color: var(--shopify);
      border: 1.5px solid var(--shopify);
    }
  </style>
</head>
<body>

<h1>Catálogo de Iluminación</h1>

<div class="search-container">
  <input type="text" id="buscador" placeholder="¿Qué buscas hoy? (Nombre o Referencia)">
</div>

<div class="grid" id="catalogo"></div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS9QD0qdhIfzYUJymEjvB4Q9OO3BFDYqWZpiZMVssAE4nQQYJJZ7Y6Isc_brmSUqqH9CFYlxwxHlGzq/pub?gid=0&single=true&output=csv";
let productosTotales = [];

function mostrarProductos(productos) {
  const container = document.getElementById("catalogo");
  container.innerHTML = "";

  productos.forEach(p => {
    // Función de limpieza de datos mejorada
    const getVal = (key) => {
      const foundKey = Object.keys(p).find(k => k.toLowerCase().trim() === key);
      return p[foundKey] ? String(p[foundKey]).trim() : "";
    };

    const nombre = getVal('nombre');
    const precio = getVal('precio');
    const imagen = getVal('imagen');
    const inventario = getVal('inventario');
    const codigo = getVal('codigo');
    const shopify = getVal('link_shopify');

    if (parseInt(inventario) > 0 && nombre !== "") {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <img src="${imagen}" alt="${nombre}" loading="lazy" onerror="this.src='https://placehold.co/400x400?text=Foto+Proximamente'">
        <div class="ref-text">REFERENCIA: ${codigo || 'N/A'}</div>
        <h3>${nombre}</h3>
        <div class="price">$${Number(precio).toLocaleString('es-CO')}</div>
        <div class="stock-text">Disponibles: <b>${inventario}</b></div>
        
        <div class="buttons-gap">
          <a class="btn btn-wa" target="_blank"
            href="https://wa.me/573218018059?text=Hola! Me interesa la REF: ${codigo} (${nombre})">
            Pedir por WhatsApp
          </a>
          ${shopify ? `<a href="${shopify}" class="btn btn-shopify" target="_blank">Ver en Web</a>` : ''}
        </div>
      `;
      container.appendChild(card);
    }
  });
}

Papa.parse(sheetURL, {
  download: true,
  header: true,
  complete: (results) => {
    productosTotales = results.data;
    mostrarProductos(productosTotales);
  }
});

document.getElementById('buscador').addEventListener('input', (e) => {
  const term = e.target.value.toLowerCase();
  const filtered = productosTotales.filter(p => {
    const n = (p.nombre || "").toLowerCase();
    const c = (p.codigo || "").toLowerCase();
    return n.includes(term) || c.includes(term);
  });
  mostrarProductos(filtered);
});
</script>

</body>
</html>
