<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Catálogo Multi-Categoría - MarketingECG</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    :root {
      --primary: #f7d000;
      --shopify: #008060;
      --bg: #f4f4f4;
      --danger: #e74c3c;
      --success: #2ecc71;
      --dark: #222;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      padding: 0;
      margin: 0;
      padding-top: 140px; /* Espacio para el menú fijo */
    }

    /* MENU RESPONSIVE */
    .nav-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    header h1 {
      margin: 10px 0;
      font-size: 1.4rem;
      text-align: center;
      color: var(--dark);
    }

    .menu-categorias {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      overflow-x: auto; /* Scroll horizontal en móviles */
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
    }

    .category-btn {
      padding: 8px 18px;
      border: 2px solid transparent;
      border-radius: 20px;
      background: #eee;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      font-size: 0.9rem;
    }

    .category-btn:hover {
      background: var(--primary);
      transform: translateY(-2px);
    }

    .category-btn.active {
      background: var(--primary);
      border-color: var(--dark);
    }

    /* BUSCADOR */
    .search-container {
      text-align: center;
      padding: 10px;
      background: white;
    }

    #buscador {
      width: 90%;
      max-width: 400px;
      padding: 10px 20px;
      border-radius: 25px;
      border: 1px solid #ddd;
      outline: none;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      max-width: 1300px;
      margin: 0 auto;
      padding: 20px;
    }

    /* CARD Y BADGES (Tu lógica anterior) */
    .card {
      background: white;
      padding: 15px;
      border-radius: 16px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.08);
      text-align: center;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .badge {
      position: absolute;
      top: 15px;
      right: 15px;
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      color: white;
      z-index: 5;
    }
    .badge-nuevo { background: var(--success); }
    .badge-agotado { background: var(--danger); }
    .badge-nada { display: none; }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 12px;
    }

    .agotado-img { filter: grayscale(0.8) opacity(0.6); }

    .price { font-size: 1.4rem; font-weight: 800; margin: 10px 0; }
    .btn { padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; display: block; margin-top: 5px;}
    .btn-wa { background: var(--primary); color: #000; }

    /* Scrollbar estética para el menú */
    .menu-categorias::-webkit-scrollbar { height: 4px; }
    .menu-categorias::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
  </style>
</head>
<body>

<div class="nav-container">
  <header>
    <h1>Catálogo MarketingECG</h1>
  </header>
  
  <div class="menu-categorias">
    <button class="category-btn active" onclick="filtrarCategoria('todos')">Todos</button>
    <button class="category-btn" onclick="filtrarCategoria('iluminacion')">Iluminación</button>
    <button class="category-btn" onclick="filtrarCategoria('termoencogible')">Termoencogible</button>
    <button class="category-btn" onclick="filtrarCategoria('equipos-herramientas')">Equipos</button>
    <button class="category-btn" onclick="filtrarCategoria('electronica')">Electrónica</button>
  </div>

  <div class="search-container">
    <input type="text" id="buscador" placeholder="Buscar en esta categoría...">
  </div>
</div>

<div class="grid" id="catalogo"></div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS9QD0qdhIfzYUJymEjvB4Q9OO3BFDYqWZpiZMVssAE4nQQYJJZ7Y6Isc_brmSUqqH9CFYlxwxHlGzq/pub?gid=0&single=true&output=csv";
let productosTotales = [];
let categoriaActual = 'todos';

function mostrarProductos(productos) {
  const container = document.getElementById("catalogo");
  container.innerHTML = "";

  productos.forEach(p => {
    const getVal = (key) => {
      const foundKey = Object.keys(p).find(k => k.toLowerCase().trim() === key);
      return p[foundKey] ? String(p[foundKey]).trim() : "";
    };

    const nombre = getVal('nombre');
    const precio = getVal('precio');
    const imagen = getVal('imagen');
    const inventario = getVal('inventario');
    const codigo = getVal('codigo');
    const estado = getVal('estado').toLowerCase();
    const categoriaProd = getVal('categoria').toLowerCase();

    // Lógica de visualización
    if (nombre !== "" && (parseInt(inventario) > 0 || estado === 'agotado')) {
      
      let msjExtra = estado === 'agotado' ? " (Agotado, consulto disponibilidad)" : "";
      const waLink = `https://wa.me/573218018059?text=Hola! Me interesa: ${nombre} - REF: ${codigo}${msjExtra}`;

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <span class="badge badge-${estado}">${estado}</span>
        <img src="${imagen}" class="${estado === 'agotado' ? 'agotado-img' : ''}" onerror="this.src='https://placehold.co/400x400?text=Sin+Foto'">
        <div style="font-size:0.8rem; color:grey; margin-top:10px;">REF: ${codigo}</div>
        <h3>${nombre}</h3>
        <div class="price">$${Number(precio).toLocaleString('es-CO')}</div>
        <a class="btn btn-wa" target="_blank" href="${waLink}">
          ${estado === 'agotado' ? 'Consultar' : 'Pedir WhatsApp'}
        </a>
      `;
      container.appendChild(card);
    }
  });
}

// FUNCIÓN DE FILTRADO POR MENÚ
function filtrarCategoria(cat) {
  categoriaActual = cat;
  
  // Actualizar botones UI
  document.querySelectorAll('.category-btn').forEach(btn => {
    btn.classList.remove('active');
    if(btn.textContent.toLowerCase().includes(cat.split('-')[0])) btn.classList.add('active');
  });

  aplicarFiltros();
}

function aplicarFiltros() {
  const termino = document.getElementById('buscador').value.toLowerCase();
  
  const filtrados = productosTotales.filter(p => {
    const catProd = (p.categoria || "").toLowerCase().trim();
    const nombreProd = (p.nombre || "").toLowerCase();
    const codigoProd = (p.codigo || "").toLowerCase();

    const coincideCategoria = (categoriaActual === 'todos' || catProd === categoriaActual);
    const coincideBusqueda = nombreProd.includes(termino) || codigoProd.includes(termino);
    
    return coincideCategoria && coincideBusqueda;
  });

  mostrarProductos(filtrados);
}

Papa.parse(sheetURL, {
  download: true,
  header: true,
  complete: (results) => {
    productosTotales = results.data;
    mostrarProductos(productosTotales);
  }
});

document.getElementById('buscador').addEventListener('input', aplicarFiltros);

</script>
</body>
</html>
